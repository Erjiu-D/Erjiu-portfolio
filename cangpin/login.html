<html>
 <head>
 	<title>登录</title>
   <link rel="stylesheet" type="text/css" href="css/login.css">
 </head>
 <body >
 	<div class="container">
		<div class="login-content"  >
		<!--<image src="images/bg_img.jpg" ></image>-->
		  <table align="center">
		    <tr >
			  <td height="100px"></td>
			</tr>
		    <tr align="center">
			  <td align="center">
			  <image src="images/logo.png"></image>
			  </td>
			</tr>
			<tr>
			  <td height="50px">
			  </td>
			</tr>
			<tr align="center">
			  <td height="50px" align="center">
			  <input  maxlength="11" type="number" placeholder-class="placeholder-input" placeholder="手机号" name="phone" class="form-control"></input>
			  </td>
			</tr>
			<tr align="center">
			  <td height="50px" align="center">
			  <input  maxlength="16" type="password" placeholder-class="placeholder-input" placeholder="密码" name="password" class="form-control"></input>
			  </td>
			</tr>
			<tr align="center">
			 <td>
			   <button style="opacity: {{opacity}};color: white; background-color: #09bb07;" disabled="{{disabled}}" class="marginview" form-type="submit" hover-class="hover-login-btn">登录</button>
			 </td>
			</tr>
			<tr>
			  <td>
			    <a href="http://www.baidu.com">百度</a>
			  </td>
			</tr>
		  </table>
		</div>
	</div>
 </body>
</html>
