  <title>修改密码</title>
  <link rel="stylesheet" type="text/css" href="css/app.css">
  <link rel="stylesheet" type="text/css" href="css/changepassword.css">
 </head>
 <body>
 <div class="container ">
 <div class="container1 bgf5f8fa">
   
   <form >
    <div class="ibox-title-2">
      <label class="fs28 col8">请设置您的新密码(6至16位字母或数字组合)</label>
    </div>
    <div class="ibox-content bgf" style="border-bottom:1px #ccc solid">
      <label class="icon-name fs34">新密码</label>
      <input placeholder="请输入您的新密码" password bindinput="password" name="password" maxlength="16" placeholder-class="placeholder-input"/>
    </div>
    <div class="ibox-content bgf mb36">
      <label class="icon-name fs34">确认密码</label>
      <input placeholder="请重新输入您的新密码" password name="confirm" maxlength="16" placeholder-class="placeholder-input"/>
    </div>
    <div class="ibox-content">
      <button style="color: white; background-color: #09bb07;width:200px;height:50px;" >保存</button>
    </div>
  </form>

 </div>
 </div>
  
 </body>
