      <label class="fs28 col87">在网络和信息时代里，博物馆网站已经成为博物馆对外传播的重要途径，而其中的典藏文物的说明文字更是在沟通博物馆与受众的过程中扮演着越来越重要的角色。藏品说明内容的合理性直接决定着藏品信息的传播效率，决定着博物馆文化在人们生活中的影响力。本文旨在通过对选取的博物馆网站上的藏品说明文字内容以及受众调查结果的比较分析，为优秀的博物馆网站内藏品说明的构建提供一些借鉴和参考</label>
