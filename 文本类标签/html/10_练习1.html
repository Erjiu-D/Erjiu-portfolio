		<div class="father">
			<pre>
贺新郎·和徐斯远下第谢诸公载酒相访韵
				 <span>辛弃疾 〔宋代〕</span>
			</pre>
		</div>
		<hr>
		<div class="son"><pre>
    逸气轩眉宇。似王良轻车熟路，骅骝欲舞。我觉君非池中物
，咫尺蛟龙云雨。
    时与命犹须天付。兰佩芳菲无人问，叹灵均欲向重华诉。空
壹郁，共谁语？
    儿曹不料扬雄赋。怪当年《甘泉》误说，青葱玉树。风引船
回沧溟阔，目断三山伊阻。但笑指吾庐何许。
    门外苍官千百辈，尽堂堂八尺须髯古。谁载酒，带湖去。
			</pre></div>
