		<h1>青玉案·元夕</h1>
		<h2>辛弃疾 〔宋代〕</h2>
		<hr>
		<p>东风夜放花千树，更吹落、星如雨。宝马雕车香满路。</p>
		<p>凤箫声动，玉壶光转，一夜鱼龙舞。</p>
		<p>蛾儿雪柳黄金缕，笑语盈盈暗香去。</p>
		<p>众里寻他千百度，蓦然回首，那人却在，灯火阑珊处。</p>
