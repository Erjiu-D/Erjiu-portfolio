<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>生活满意度测评表</title>
	</head>
	<style>
		td{
			font-size: 20px;
		}
	</style>
	<body>
		<div>
			<table align="center">
				<caption><h1>生活满意度测评表</h1></caption>
				<tr>
					<td><label for="userName">姓名:</label></td>
					<td><input type="text" id="userName" placeholder="请输入姓名"></td>
				</tr>
				<tr>
					<td><label for="age">年纪:</label></td>
					<td><input type="text" id="xibie" placeholder="请输入年纪"></td>
				</tr>
				<tr>
					<td>性别:</td>
					<td>
						<input type="radio" name="sex" value="male" checked>男
						<input type="radio" name="sex" value="female">女
					</td>
				</tr>
				<tr>
					<td><label for="userPhone">联系电话:</label></td>
					<td><input type="text" id="userPhone" placeholder="请输入联系电话"></td>
				</tr>
				<tr>
					<td><label for="zhuanye">所学专业:</label></td>
					<td><input type="text" id="zhuanye" placeholder="请输入专业"></td>
				</tr>
				<tr>
					<td>生活城市:</td>
					<td>
						<select name="" id="">
							<option value="1"selected>太原</option>
							<option value="2">忻州</option>
							<option value="3">运城</option>
							<option value="4">晋城</option>
							<option value="5">吕梁</option>
							<option value="6">大同</option>
							<option value="7">晋中</option>
						</select>
					</td>
				</tr>
				<tr>
					<td>生活城市满意度:</td>
					<td>
						<select name="" id="">
							<option value="1"selected>10</option>
							<option value="2">9</option>
							<option value="3">8</option>
							<option value="4">7</option>
							<option value="5">6</option>
							<option value="6">5</option>
							<option value="7">4</option>
						</select>
					</td>
				</tr>
			</table>
		</div>
	</body>
</html>
