<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>表单IV</title>
	</head>
	<link rel="stylesheet" href="../css/base.css" type="text/css">
	<body>
		<a href="../index.html"><div class="home">主页</div></a>
		<p>多选表单</p>
		<table>
			<tr>
				<td>学习专业:</td>
				<td>
					<input name="checkBox" type="checkbox" id="PS">
					<label for="PS">PS</label><br>
					<input name="checkBox" type="checkbox" id="C++">
					<label for="C++">C++</label><br>
					<input name="checkBox" type="checkbox" id="Flash">
					<label for="Flash">Flash</label><br>
					<input name="checkBox" type="checkbox" id="JAVA">
					<label for="JAVA">JAVA</label><br>
					<input name="checkBox" type="checkbox" id="HTML">
					<label for="HTML">HTML</label><br>
					<input name="checkBox" type="checkbox" id="CSS">
					<label for="CSS">CSS</label><br>
					<input name="checkBox" type="checkbox" id="JavaScript">
					<label for="JavaScript">JavaScript</label><br>
				</td>
			</tr>
		</table>
		<hr>
		<p>一般表单的标签&lt;input&gt;&lt;/input&gt;</p>
		<p>在其中使用“type="checkbox"”作为多选项目，数量可以自己选择，并且也可以使用lable与表单联系使用</p>
	</body>
</html>
