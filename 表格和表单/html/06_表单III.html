<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>表单III</title>
	</head>
	<link rel="stylesheet" href="../css/base.css" type="text/css">
	<body>
		<a href="../index.html"><div class="home">主页</div></a>
		<p>下拉选择表单</p>
		<table>
			<tr>
				<td>城市:</td>
				<td>
					<select name="" id="">
						<option value="1"selected>太原</option>
						<option value="2">忻州</option>
						<option value="3">运城</option>
						<option value="4">晋城</option>
						<option value="5">吕梁</option>
						<option value="6">大同</option>
						<option value="7">晋中</option>
					</select>
				</td>
			</tr>
		</table>
		<hr>
		<p>区别于之前表单，选用&lt;select&gt;&lt;/select&gt;作为标签</p>
		<p>在其中使用&lt;option&gt;&lt;/option&gt;作为选择项目，数量可以自己选择，在此标签中输入“selected”作为默认选项</p>
	</body>
</html>
