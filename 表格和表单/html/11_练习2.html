<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>学生个人简介</title>
	</head>
	<link rel="stylesheet" href="../css/test2.css">
	<body>
		<div class="all">
				<form action="">
					<table align="center" cellspacing="10px" >
						<caption><h1>学生专业信息调查表</h1></caption>
						<tr>
							<td class="son2"><label for="xibie">系别:</label></td>
							<td class="son3"><input type="text" id="xibie" placeholder="请输入系别"></td>
						</tr>
						<tr>
							<td class="son2"><label for="zhuanye">专业:</label></td>
							<td><input type="text" id="zhuanye" placeholder="请输入专业"></td>
						</tr>
						<tr>
							<td class="son2"><label for="banji">班级:</label></td>
							<td><input type="text" id="banji" placeholder="请输入班级"></td>
						</tr>
						<tr>
							<td class="son2"><label for="userName">姓名:</label></td>
							<td><input type="text" id="userName" placeholder="请输入姓名"></td>
						</tr>
						<tr>
							<td class="son2"><label for="userNo">学号:</label></td>
							<td><input type="text" id="userNo" placeholder="请输入学号"></td>
						</tr>
						<tr>
							<td class="son2"><label for="userPhone">联系电话:</label></td>
							<td><input type="text" id="userPhone" placeholder="请输入联系电话"></td>
						</tr>
						<tr>
							<td class="son2">性别:</td>
							<td>
								<input type="radio" name="sex" value="male" checked>男
								<input type="radio" name="sex" value="female">女
							</td>
						</tr>
						<tr>
							<td class="son2">城市:</td>
							<td class="son1"> 
								<select name="" id="">
									<option value="1"selected>太原</option>
									<option value="2">忻州</option>
									<option value="3">运城</option>
									<option value="4">晋城</option>
									<option value="5">吕梁</option>
									<option value="6">大同</option>
									<option value="7">晋中</option>
								</select>
							</td>
						</tr>
							<td class="son2">学习技能:</td>
							<td class="son1">
								<input name="checkBox" type="checkbox" id="PS">
								<label for="PS">PS</label><br>
								<input name="checkBox" type="checkbox" id="C++">
								<label for="C++">C++</label><br>
								<input name="checkBox" type="checkbox" id="Flash">
								<label for="Flash">Flash</label><br>
								<input name="checkBox" type="checkbox" id="JAVA">
								<label for="JAVA">JAVA</label><br>
								<input name="checkBox" type="checkbox" id="HTML">
								<label for="HTML">HTML</label><br>
								<input name="checkBox" type="checkbox" id="CSS">
								<label for="CSS">CSS</label><br>
								<input name="checkBox" type="checkbox" id="JavaScript">
								<label for="JavaScript">JavaScript</label><br>
							</td>
						</tr>
						<tr>
							<td class="son2"><label for="honor">在校荣誉:</label></td>
							<td><textarea name="" id="honor" cols="62" rows="10"></textarea></td>
						</tr>
						<tr>
							<td class="son2"><label for="introduction">个人简介:</label></td>
							<td><textarea name="" id="introduction" cols="62" rows="10"></textarea></td>
						</tr>
						<tr class="noneTr">
							<td colspan="3" align="center" class="noneTr"><input type="submit"><input type="reset"></td>
						</tr>
					</table>
				</form>
			</div>
		</body>
	</body>
</html>
