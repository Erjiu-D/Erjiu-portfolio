<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>表单VI</title>
	</head>
	<link rel="stylesheet" href="../css/base.css" type="text/css">
	<body>
		<a href="../index.html"><div class="home">主页</div></a>
		<p>
			文本域表单
		</p>
		<table>
			<tr>
				<td><label for="honor">在校荣誉:</label></td>
				<td><textarea name="" id="honor" cols="30" rows="10"></textarea></td>
			</tr>
			<tr>
				<td><label for="introduction">个人简介:</label></td>
				<td><textarea name="" id="introduction" cols="30" rows="10"></textarea></td>
			</tr>
		</table>
		<hr>
		<p>区别于inout标签，使用&lt;textarea&gt;&lt;/textarea&gt;作为标签</p>
		<p>其中可以使用cols和cows设置宽和高</p>
	</body>
</html>
