<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>表单II</title>
	</head>
	<link rel="stylesheet" href="../css/base.css" type="text/css">
	<body>
		<a href="../index.html"><div class="home">主页</div></a>
		<p>单选框表单</p>
		<table>
			<tr>
				<td>性别:</td>
				<td>
					<input type="radio" name="sex" value="male" checked>男
					<input type="radio" name="sex" value="female">女
				</td>
			</tr>
		</table>
		<hr>
		<p>一般表单的标签&lt;input&gt;&lt;/input&gt;</p>
		<p>在其中的“type=radio”决定了他是一个单选按钮,“value=****”是表示默认内容，checked表示被默认选中</p>
	</body>
</html>
