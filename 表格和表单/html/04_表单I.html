<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>表单I</title>
	</head>
	<link rel="stylesheet" href="../css/base.css" type="text/css">
	<body>
		<a href="../index.html"><div class="home">主页</div></a>
		<p>普通的输入栏</p>
		<label for="userName">姓名:</label>
		<input type="text" id="userName" placeholder="请输入姓名">
		<label for="userNum">学号:</label>
		<input type="text" id="userNum" placeholder="请输入学号">
		<hr>
		<p>一般表单的标签&lt;input&gt;&lt;/input&gt;</p>
		<p>用&lt;label&gt;&lt;/label&gt;中的“for=***”来与input绑定</p>
		<p>在其中的“type=text”决定了他是一个文本输入框,“id=***”决定他和哪个label标签相互绑定，“placeholder=****”是表示默认内容</p>
	</body>
</html>
