<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>按钮式超链接</title>
	</head>
	<style>
		a{
			text-decoration: none;
			margin-left: 20px;
		}
		a:link,a:visited{
			border-top: 1px solid #6cf;
			border-left:1px solid #6cf ;
			border-bottom:1px solid #6680ff;
			border-right:1px solid #6680ff;
		}
		a:hover{
			border-top:1px solid #6680ff;
			border-left:1px solid #6680ff;
			border-bottom:1px solid #6cf ;
			border-right:border-bottom:1px solid #6cf ; ;
		}
	</style>
	<body>
		<p>
			<a href="https://www.w3school.com.cn/index.html" target="_blank">W3School</a>
			<a href="https://www.baidu.com/">百度</a>
		</p>
	</body>
</html>
