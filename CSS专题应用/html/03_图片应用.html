<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>图片应用</title>
	</head>
	<style>
		.d1{
			height: 500px;
			width: 500px;
			background-color: azure;
			border: solid;
			border-width: 10px 20px 30px 40px;
			/* 上 右 下 左 */
			border-color: blueviolet gold blue red; 
			font-size: 20px
		}
		.d2{
			height: 500px;
			width: 500px;
			border: solid;
			background-image:url(../img/sucai.jpg);
			background-repeat: no-repeat;
			background-position:20px 20px;
		}
	</style>
	<body>
		<div class="d1">
			人生代代无穷已，<br>江月年年望相似。
		</div>
		<br><br><br>
		<div class="d2">
			
		</div>
	</body>
</html>
