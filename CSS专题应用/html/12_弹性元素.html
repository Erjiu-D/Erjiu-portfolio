<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>弹性元素</title>
	</head>
	<style>
		.father {
			width: 500px;
			height: 500px;
			background-color: #6680ff;
			display: flex;
		}

		div {
			width: 200px;
			height: 100px;
		}

		.son1 {
			height: 140px;
			background-color: #66ffe6;
			flex-shrink: 1;
			flex-grow: 1;
			/* order: 1; */
			width: 300px;
		}
		.son2{
			background-color: #66ccff;
			flex-shrink: 2;
			 flex-grow: 2;
			 /* order: 2; */
			 width: 200px;
		}
		.son3{
			background-color: blue;
			flex-shrink: 3;
			 flex-grow: 3;
			 /* order: 3; */
			 width: 150px;
		}
	</style>
	<body>
		<div class="father">
			<div class="son1">1</div>
			<div class="son2">2</div>
			<div class="son3">3</div>
		</div>
	</body>
</html>
