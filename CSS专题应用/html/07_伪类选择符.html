<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>伪类选择符</title>
	</head>
	<style>
		a:link {
			color: red;
			text-decoration: none;
		}

		a:visited {
			color: green;
		}

		a:hover {
			color: hotpink;
		}

		a:active {
			color: blue;
		}
	</style>
	<body>
		<p>
			<a href="https://www.w3school.com.cn/index.html" target="_blank">W3School</a>
			<a href="https://www.baidu.com/">百度</a>
		</p>
	</body>
</html>
