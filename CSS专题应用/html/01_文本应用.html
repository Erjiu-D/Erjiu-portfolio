<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>文本应用</title>
	</head>
	<style>
		.p1{
			font-family: 楷体;
			font-size: 20px;
			font-weight: normal;
			color: brown;
		}
		.p2{
			font-family: 微软雅黑, 'Times New Roman', Times, serif;
			font-size: 20px;
			font-weight: bold;
			color: crimson;
		}
		.p3{
			font-family: 宋体,幼圆,微软雅黑;
			font-size: 20px;
			font-weight: bolder;
			color: cornflowerblue;
		}
		.p4{
			font-size: 20px;
			font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
			font-weight: 100;
			color: darkblue;
		}
	</style>
	<body>
		<h1>font类型</h1>
		<h2>春江花月夜</h2>
		<p class="p1">春江潮水连海平，海上明月共潮生。</p>
		<p class="p2">滟滟随波千万里，何处春江无月明！</p>
		<p class="p3">江流宛转绕芳甸，月照花林皆似霰。</p>
		<p class="p4">空里流霜不觉飞，汀上白沙看不见。</p>
		<p class="p1">江天一色无纤尘，皎皎空中孤月轮。</p>
		<p class="p2">江畔何人初见月？江月何年初照人？</p>
		<p class="p3">人生代代无穷已，江月年年望相似。</p>
		<p class="p4">不知江月待何人，但见长江送流水。</p>
	</body>
</html>
