<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>基于列表的超链接</title>
	</head>
	<style>
		ul {
			list-style-type: none;
			width: 200px;

		}

		li {
			border-bottom: 1px solid #66ffe6;
		}

		a {
			text-decoration: none;
			display: block;
			border-left: 2px solid #66ffe6;
			border-right: 2px solid #66ffe6;
			padding: 4px 8px;
		}
		a:link,a:visited{
			color: #6cf;
			background-color: #6680ff;
		}
		a:hover{
			color: #6680ff;
			background-color: #6cf;
		}
	</style>
	<body>
		<ul>
			<li><a href="../index.html">首页</a></li>
			<li><a href="https://www.w3school.com.cn/index.html">W3School</a></li>
			<li><a href="https://www.baidu.com/">百度</a></li>
			<li><a href="https://www.mcbbs.net/forum.php">我的世界中文论坛</a></li>
		</ul>
	</body>
</html>
