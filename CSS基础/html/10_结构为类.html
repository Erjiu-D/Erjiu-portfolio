<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>结构为类</title>
	</head>
	<style>
		.A>p:first-child {
			color: red;
		}

		.B>p:last-child {
			color: blue;
		}

		.notice {
			color: red;
			font-size: 20px;
		}

		.other>.C:first-of-type {
			color: #66ccff;
		}
	</style>
	<link rel="stylesheet" href="../css/base.css" type="text/css">
	<body>
		<a href="../index.html"><div class="home">主页</div></a>
		<h1>结构为类</h1>
		<div class="A">
			<p>首:第一个</p>
			<p>中:第二个</p>
			<p>尾:第三个</p>
		</div>
		<hr>
		<div class="B">
			<p>首:第一个</p>
			<p>中:第二个</p>
			<p>尾:第三个</p>
		</div>
		<p class="notice">注意：结构伪类除了first-child和last-child还可以使用nth-child,而nth的选取则可以根据设计者或用户需求来设定。</p>
		<hr>
		<h3>选择作为其父的首个 class="C" 元素的每个 class="C" 元素。与:first-child类似，其余格式同类似。</h3>
		<div class="other">
			<p class="C">首:第一个</p>
			<p class="C">中:第二个</p>
			<p class="C">尾:第三个</p>
		</div>
	</body>
</html>
