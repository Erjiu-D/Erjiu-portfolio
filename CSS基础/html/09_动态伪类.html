<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>动态伪类</title>
	</head>
	<style>
		a:link {
			color: red;
		}

		a:visited {
			color: green;
		}

		a:hover {
			color: hotpink;
		}

		a:active {
			color: blue;
		}
	</style>
	<link rel="stylesheet" href="../css/base.css" type="text/css">
	<body>
		<a href="../index.html"><div class="home">主页</div></a>
		<h1>CSS 链接</h1>
		<p><b><a href="https://www.w3school.com.cn/index.html" target="_blank">这是一个链接</a></b></p>
		<p><b>注释：</b>在 CSS 定义中，a:hover 必须位于 a:link 和 a:visited 之后才能生效。</p>
		<p><b>注释：</b>在 CSS 定义中，a:active 必须位于 a:hover 之后才能生效。</p>
	</body>
</html>
